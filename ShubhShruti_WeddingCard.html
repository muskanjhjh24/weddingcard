/* ===== NAVIGATION ===== */
let cur=0, tot=9;
function goTo(n){
  document.getElementById('p'+cur).classList.add('page-h');
  const dots=document.querySelectorAll('.ndot');
  dots[cur].classList.remove('active');
  dots[cur].style.background='rgba(139,26,26,0.2)';
  cur=n;
  document.getElementById('p'+cur).classList.remove('page-h');
  dots[cur].classList.add('active');
  dots[cur].style.background=CONFIG.primaryRed;
  document.getElementById('pctr').textContent=(cur+1)+' / '+tot;
  document.getElementById('bp').style.visibility=cur===0?'hidden':'visible';
  document.getElementById('bn').style.visibility=cur===tot-1?'hidden':'visible';
  window.scrollTo({top:0,behavior:'smooth'});
}
function nav(d){if(cur+d>=0&&cur+d<tot)goTo(cur+d);}

/* disco animation */
document.head.insertAdjacentHTML('beforeend',`<style>@keyframes discorot{from{transform:rotate(0deg) translate(50px)}to{transform:rotate(360deg) translate(50px)}}</style>`);
